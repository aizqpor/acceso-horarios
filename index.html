<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>Acceso a la elección de horario</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
      background: #f4f7f9;
      font-family: Arial, Helvetica, sans-serif;
      color: #243746;
    }

    .contenedor {
      width: 100%;
      max-width: 560px;
      padding: 32px;
      box-sizing: border-box;
      border: 1px solid #cbdfea;
      border-radius: 16px;
      background: #ffffff;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      color: #174a6e;
      font-size: 25px;
    }

    p {
      margin: 10px 0;
      font-size: 17px;
      line-height: 1.55;
    }

    .cargando {
      width: 38px;
      height: 38px;
      margin: 24px auto;
      border: 4px solid #dcecf5;
      border-top-color: #2f80c9;
      border-radius: 50%;
      animation: girar 0.8s linear infinite;
    }

    @keyframes girar {
      to {
        transform: rotate(360deg);
      }
    }

    #enlaceAlternativo {
      display: none;
      margin-top: 22px;
      padding: 14px 22px;
      border-radius: 10px;
      background: #2f80c9;
      color: #ffffff;
      font-weight: bold;
      text-decoration: none;
    }

    .error {
      color: #a61b1b;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <main class="contenedor">
    <h1>C.E.M. Luis de Narváez</h1>

    <p id="mensaje">
      Accediendo a la elección de horario…
    </p>

    <div
      id="cargando"
      class="cargando"
      aria-label="Cargando"
    ></div>

    <a id="enlaceAlternativo">
      Continuar
    </a>
  </main>

  <script>
    (function () {
      const URL_APLICACION =
        'https://script.google.com/macros/s/AKfycbxED3qNMwHOQj6BfGOhG_OonNGF_T9Jz0RljBuQxDn7XWp2OpJhZcRz8VBS-bgBaE4F/exec';

      const parametros =
        new URLSearchParams(window.location.search);

      const token =
        String(parametros.get('token') || '').trim();

      const mensaje =
        document.getElementById('mensaje');

      const cargando =
        document.getElementById('cargando');

      const enlaceAlternativo =
        document.getElementById('enlaceAlternativo');

      if (!token) {
        cargando.style.display = 'none';
        mensaje.className = 'error';
        mensaje.textContent =
          'El enlace no contiene un código de acceso válido.';
        return;
      }

      const destino =
        URL_APLICACION +
        '?token=' +
        encodeURIComponent(token);

      enlaceAlternativo.href = destino;

      window.setTimeout(function () {
        window.location.replace(destino);
      }, 350);

      window.setTimeout(function () {
        mensaje.textContent =
          'Pulse Continuar para acceder a la elección.';
        cargando.style.display = 'none';
        enlaceAlternativo.style.display = 'inline-block';
      }, 3000);
    })();
  </script>
</body>
</html>
